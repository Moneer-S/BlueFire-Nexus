# BlueFire-Nexus Configuration Example
# Security-first defaults: dry_run enabled, no remote egress unless opted in.

general:
  name: "BlueFire-Nexus"
  version: "2.0.0"
  mode: "simulation"
  log_level: "INFO"
  dry_run: true
  safeties:
    auto_wipe: false
    max_runtime: 3600
    allowed_subnets:
      - "10.0.0.0/24"

modules:
  ai:
    enabled: false
    provider: "template"   # one of: template, openai, anthropic, google, ollama, lm-studio, openai_compatible
    model: "default"
    api_base: ""           # e.g. https://api.openai.com/v1 or local gateway URL
  initial_access:
    enabled: true
  execution:
    enabled: true
    allow_real_execution: false
  persistence:
    enabled: true
  defense_evasion:
    enabled: true
  anti_detection:
    enabled: true
  discovery:
    enabled: true
  intelligence:
    enabled: true
  network_obfuscator:
    enabled: true
  resource_development:
    enabled: true
  reconnaissance:
    enabled: true
  exfiltration:
    enabled: true
  command_control:
    enabled: false
  legacy:
    enable_all_lab_capabilities: false
    global_mode: simulate
    lab_confirmation: false
    announce_activation: true
    actor_pack:
      enabled: false
      mode: simulate
      lab_confirmation: false
      capabilities:
        apt29:
          enabled: false
        apt28:
          enabled: false
        apt32:
          enabled: false
        apt38:
          enabled: false
        apt41:
          enabled: false
    c2_pack:
      enabled: false
      mode: simulate
      lab_confirmation: false
      capabilities:
        dns_tunneling:
          enabled: false
        tls_fast_flux:
          enabled: false
        websocket_quic:
          enabled: false
        solana_rpc:
          enabled: false
        network_obfuscator_legacy:
          enabled: false
    stealth_pack:
      enabled: false
      mode: simulate
      lab_confirmation: false
      capabilities:
        anti_forensic:
          enabled: false
        anti_sandbox:
          enabled: false
        anti_detection_legacy:
          enabled: false
        dynamic_api:
          enabled: false

# Telemetry is local-first in the current baseline. Outbound SIEM exporters
# (Splunk/OpenSearch/Elasticsearch/NGSIEM) were removed during stabilization;
# legacy `sinks` entries naming those types are ignored at load time with a
# deprecation warning rather than restoring egress silently.
telemetry:
  enabled: true
  default_sink: "jsonl"
  local:
    enabled: true
    file: "telemetry.jsonl"
  sinks:
    - type: "jsonl"
      enabled: true