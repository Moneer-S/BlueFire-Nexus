# BlueFire-Nexus Configuration Example
# Security-first defaults: dry_run enabled, no remote egress unless opted in.

general:
  name: "BlueFire-Nexus"
  version: "2.0.0"
  mode: "simulation"
  log_level: "INFO"
  dry_run: true
  safeties:
    auto_wipe: false
    max_runtime: 3600
    allowed_subnets:
      - "10.0.0.0/24"

modules:
  ai:
    enabled: false
    provider: "template"   # one of: template, openai, anthropic, google, ollama, lm-studio, openai_compatible
    model: "default"
    api_base: ""           # e.g. https://api.openai.com/v1 or local gateway URL
  initial_access:
    enabled: true
  execution:
    enabled: true
    allow_real_execution: false
  persistence:
    enabled: true
  defense_evasion:
    enabled: true
  anti_detection:
    enabled: true
  discovery:
    enabled: true
  intelligence:
    enabled: true
  network_obfuscator:
    enabled: true
  resource_development:
    enabled: true
  reconnaissance:
    enabled: true
  exfiltration:
    enabled: true
  command_control:
    enabled: false

telemetry:
  enabled: true
  default_sink: "jsonl"
  sinks:
    - type: "jsonl"
      enabled: true
    - type: "opensearch"
      enabled: false
      endpoint: "https://opensearch.example.lab/_bulk"
      headers:
        Authorization: "ApiKey {{ env OPENSEARCH_API_KEY }}"
    - type: "elasticsearch"
      enabled: false
      endpoint: "https://elasticsearch.example.lab/_bulk"
      headers:
        Authorization: "ApiKey {{ env ELASTICSEARCH_API_KEY }}"
    - type: "ngsiem"
      enabled: false
      endpoint: "https://ngsiem.example.lab/api/ingest/hec"
      headers:
        Authorization: "Bearer {{ env NGSIEM_TOKEN }}"
    - type: "splunk"
      enabled: false
      endpoint: "https://splunk.example.lab:8088/services/collector/event"
      headers:
        Authorization: "Splunk {{ env SPLUNK_TOKEN }}"