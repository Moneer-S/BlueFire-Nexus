version: "3.9"

# Optional containerised lab profile for running BlueFire scenarios in a
# clean Python environment without installing dependencies on the host.
# Telemetry stays local-first; no SIEM stack is provisioned in the baseline.

services:
  bluefire:
    image: python:3.11-slim
    working_dir: /app
    volumes:
      - ./:/app
    command: >
      bash -lc "pip install -r requirements-dev.txt && python -m src.run_scenario --profile apt29_credential_access --output-json"
