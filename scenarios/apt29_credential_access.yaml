name: apt29_credential_access
objective: Simulate an ATT&CK-aligned credential access chain in a lab.
attack_coverage:
  - T1566
  - T1059
  - T1055
  - T1555
  - T1041
fail_fast: true
steps:
  - id: initial-phish
    name: Initial access via phishing
    module: initial_access
    params:
      vector: phishing_email
      target: finance-user
      network_touch: false
  - id: command-exec
    name: Execute staged command payload
    module: execution
    params:
      command: "echo apt29-simulated-command"
      network_touch: false
  - id: credential-access
    name: Memory-evasion behavior precedes credential access
    module: anti_detection
    params:
      method: memory_evasion
      network_touch: false
  - id: credential-extraction
    name: Browser-stored credential extraction on finance host
    module: credential_access
    params:
      technique: browser_credentials
      target: finance-user
      network_touch: false
  - id: exfil
    name: Exfiltration over C2 channel to lab subnet
    module: exfiltration
    params:
      method: via_c2
      network_touch: true
      targets:
        - 10.0.0.15
expected_detections:
  - Suspicious command execution tied to phishing precursor
  - Anti-detection behavior around sensitive process activity
  - Potential exfiltration over application-layer channels
blue_team_guidance:
  - Correlate email events with process creation and outbound traffic by host/user.
  - Alert on suspicious command lines spawned from user-facing processes.
  - Investigate encoded outbound payload patterns and unusual egress destinations.
