id: apt29_credential_access
name: APT29 credential-access intrusion chain
objective: |
  Simulate an APT29-like (Cozy Bear / The Dukes / Nobelium) eight-step
  intrusion chain against a finance-sector lab host: stand up an
  attacker-owned C2 domain, spearphish a finance analyst, run an
  encoded PowerShell loader parented by OUTLOOK.EXE, evade memory
  detection, harvest browser credentials, enumerate adjacent finance
  hosts, pivot via PsExec to a target host, and exfiltrate over the
  established C2 channel. Modeled on APT29's documented tradecraft:
  spearphishing emails with encoded loader attachments, in-memory
  evasion, browser credential extraction, lateral movement to
  adjacent finance-sector hosts. Every step is simulate-only with
  ``network_touch: false``; no real process spawn, registry write,
  or live network call occurs under any input. Five chain consumer
  pairs are demonstrated end-to-end so defenders can correlate the
  typed propagation graph against their telemetry.
attack_coverage:
  - T1583.001
  - T1566
  - T1059.001
  - T1055
  - T1555.003
  - T1018
  - T1021.002
  - T1041
fail_fast: false
steps:
  - id: stage-apt29-domain
    name: APT29 stages attacker-owned domain for C2
    objective: >-
      Stand up the lookalike domain that will host the HTTPS C2
      endpoint. Defenders pivot from registrar intel on this step
      to the later C2 destination.
    module: resource_development
    params:
      resource_type: domain
      target: cdn.cloudportal.example.lab
      network_touch: false

  - id: phish-delivery
    name: Spearphishing email delivers encoded loader to finance analyst
    objective: >-
      Deliver the loader-bearing attachment to a finance analyst's
      mailbox. The first defender signal is the precursor email +
      attachment pair from the lookalike domain.
    module: initial_access
    params:
      vector: phishing_email
      target: finance-analyst@example.lab
      network_touch: false

  - id: loader-execution
    name: Encoded PowerShell loader spawned by OUTLOOK.EXE
    objective: >-
      Execute the encoded PowerShell loader from the inbox. The
      OUTLOOK.EXE -> powershell.exe parent/child chain with
      -EncodedCommand is the canonical APT29 macro signal; pin the
      parent process explicitly so the detection draft fires on
      ``process.parent_command_line|contains OUTLOOK``.
    module: execution
    params:
      command: "powershell -nop -w hidden -enc UwB0AGEAcgB0AC0AUAByAG8AYwBlAHMAcwA="
      target_os: windows
      parent_command_line: OUTLOOK.EXE
      network_touch: false

  - id: memory-evasion
    name: Loader applies in-memory evasion before credential harvest
    objective: >-
      APT29 historically obfuscates loader memory before touching
      credential stores; the ``memory_evasion`` anti-detection
      method models the loader-pre-cred-access sequence defenders
      should correlate against.
    module: anti_detection
    params:
      method: memory_evasion
      target: finance-analyst-laptop
      network_touch: false

  - id: harvest-browser-creds
    name: Harvest browser credentials from finance-analyst host
    objective: >-
      Pull stored browser credentials from the same finance host
      the loader executed on. Defender narrative: encoded-PS
      loader -> in-memory evasion -> Login Data file access on the
      same host is the high-fidelity APT29 sequence.
    module: credential_access
    params:
      technique: browser_credentials
      target: finance-analyst-laptop
      network_touch: false

  - id: discover-finance-hosts
    name: Enumerate adjacent finance-sector hosts for pivot
    objective: >-
      Walk the finance subnet for adjacent hosts the harvested
      credentials might unlock; APT29's documented tradecraft is
      lateral movement over harvested SSO / browser-stored creds.
    module: discovery
    params:
      discovery_type: host_discovery
      targets:
        - 10.10.20.0/24
      network_touch: false

  - id: lateral-pivot
    name: Pivot to adjacent finance host via PsExec
    objective: >-
      Reuse the harvested browser credentials to pivot to one of
      the discovered hosts via PsExec. Source host is propagated
      from the credential-harvest step; destination is propagated
      from the discovery step. Defenders correlate the same browser
      creds to the cross-host SMB / service-create burst.
    module: lateral_movement
    params:
      technique: psexec
      source_from_step: harvest-browser-creds
      target_from_step: discover-finance-hosts
      network_touch: false

  - id: exfil-over-c2
    name: Exfiltrate harvested data over staged HTTPS C2
    objective: >-
      Push the harvested credential bundle over the same HTTPS C2
      channel routed through the freshly-staged attacker domain.
      Defenders correlate the staged-domain registration to this
      egress event.
    module: exfiltration
    params:
      method: via_c2
      target_from_step: lateral-pivot
      network_touch: false

expected_detections:
  - APT29 attacker domain provisioning correlated with later HTTPS C2 destination
  - Spearphishing email-attachment precursor from lookalike domain
  - OUTLOOK.EXE -> powershell.exe parent/child chain with -EncodedCommand
  - In-memory evasion immediately preceding credential harvest
  - Browser stored-credential extraction (Login Data / Cookies access)
  - Finance-subnet host enumeration immediately preceding lateral pivot
  - PsExec / SMB administrative-share lateral movement to adjacent host
  - Outbound application traffic carrying harvested credential bundle

blue_team_guidance:
  - Tune detection rules to fire on registrar intelligence from
    cdn-themed lookalike domains - APT29's documented tradecraft
    favours CDN / cloud / portal lookalike names; the
    stage-apt29-domain step pins the seed for that correlation.
  - OUTLOOK.EXE -> script-engine parent/child chains with encoded
    command lines are the APT29 phishing signal; the
    loader-execution step's explicit OUTLOOK.EXE parent is the
    test case for that detection.
  - In-memory evasion artefacts (PowerShell module load /
    AmsiInitFailed / patched API) immediately preceding browser
    credential file access are the high-fidelity APT29 sequence;
    this scenario sequences memory-evasion and harvest-browser-creds
    deliberately to test that detection.
  - Finance-subnet host enumeration immediately followed by PsExec
    SMB administrative-share lateral movement is a classic
    APT29 chain; tune service-creation (event 7045) plus SMB
    file-event correlation rules against this scenario's run
    telemetry.
  - The five chain consumer pairs (stage-apt29-domain ->
    exfil-over-c2 via the C2 endpoint, harvest-browser-creds ->
    lateral-pivot source, discover-finance-hosts -> lateral-pivot
    target, lateral-pivot -> exfil-over-c2 target, plus the
    implicit phish -> execution edge) are the typed propagation
    graph defenders should pivot through when triaging this
    scenario's bundle.
