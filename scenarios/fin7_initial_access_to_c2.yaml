id: fin7_initial_access_to_c2
name: FIN7 Initial Access to C2
objective: |
  Simulate a FIN7-like three-step chain from spearphishing-attachment
  delivery through encoded PowerShell loader execution to HTTPS C2
  beaconing. Modeled after FIN7's documented restaurant / hospitality
  intrusions; runs simulate-only with `network_touch: false`, so no
  destructive payload or live traffic leaves the host under any input.
attack_coverage:
  - T1566
  - T1059
  - T1071.001
fail_fast: true
steps:
  - id: step_01
    name: Spearphishing attachment delivered to finance user
    module: initial_access
    params:
      vector: spearphishing_attachment
      target: finance-user
  - id: step_02
    name: Encoded PowerShell loader executes from attachment
    module: execution
    params:
      command: "powershell -nop -w hidden -enc UwB0AGEAcgB0AC0AUAByAG8AYwBlAHMAcwA="
      network_touch: false
  - id: step_03
    name: Loader beacons HTTPS to attacker-controlled C2
    module: command_control
    params:
      channel: http
      c2_url: "https://example.lab/c2"
      network_touch: false
expected_detections:
  - Suspicious office process spawning script interpreter
  - Encoded command line execution
  - Beacon-like outbound application traffic
blue_team_guidance:
  - Correlate parent-child process chains from office apps to script engines.
  - Alert on high-entropy or encoded command lines.
  - Baseline and detect unusual periodic outbound connections.
