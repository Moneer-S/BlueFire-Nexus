id: enterprise_intrusion_chain
name: Enterprise intrusion kill chain
objective: |
  An attacker-owned domain is staged, then a finance analyst is
  spearphished into running an encoded PowerShell loader that
  masquerades as svchost. The loader enumerates files, harvests
  browser credentials, pivots over PsExec to the corporate
  fileshare, stages data, beacons HTTPS to the staged domain,
  exfiltrates over the C2, and finally encrypts the fileshare.
  Twelve standard modules run end-to-end; every step is
  simulate-only with `network_touch: false`, so no destructive
  payload or live traffic leaves the host under any input.
attack_coverage:
  - T1583.001
  - T1593
  - T1566
  - T1059.001
  - T1036
  - T1083
  - T1555.003
  - T1021.002
  - T1074.001
  - T1071.001
  - T1041
  - T1486
fail_fast: false
steps:
  - id: stage-infrastructure
    name: Adversary registers attacker-owned phishing domain
    objective: >-
      Stand up the lookalike domain that will both deliver the phish
      and host the C2 endpoint, so defenders can pivot from
      domain-registration intelligence to the later HTTPS C2 step.
    module: resource_development
    params:
      resource_type: domain
      target: invoice-portal.example.lab
      network_touch: false

  - id: target-recon
    name: OSINT reconnaissance against victim organisation
    objective: >-
      Profile the victim org from open sources to identify a finance
      addressee for the spearphish; recon precedes phishing in every
      realistic intrusion.
    module: reconnaissance
    params:
      source: osint
      target: example.lab
      network_touch: false

  - id: phish-delivery
    name: Spearphishing email delivers loader to finance analyst
    objective: >-
      Deliver the encoded loader to a finance analyst's mailbox via a
      lookalike-domain spearphish; first defender signal is the
      precursor email + attachment / link pair.
    module: initial_access
    params:
      vector: phishing_email
      target: finance-analyst@example.lab
      network_touch: false

  - id: loader-execution
    name: Encoded PowerShell loader executes on finance-analyst host
    objective: >-
      Run the encoded PowerShell loader on the finance host to
      establish foothold; defender signal is encoded-command process
      creation parented by an email app.
    module: execution
    params:
      command: powershell -nop -w hidden -enc UwB0AGEAcgB0AC0AUAByAG8AYwBlAHMAcwA=
      network_touch: false

  - id: masquerade
    name: Loader masquerades as svchost.exe to evade EDR
    objective: >-
      Rename the loader to svchost.exe so a naive process-name allowlist
      misses it; the masquerade-vs-real-svchost mismatch is the
      detection opportunity.
    module: defense_evasion
    params:
      technique: masquerading
      target: finance-analyst-laptop
      network_touch: false

  - id: enumerate-files
    name: Enumerate sensitive files on finance-analyst host
    objective: >-
      Walk the user profile to identify high-value documents; bulk file
      enumeration immediately preceding credential extraction is a
      high-fidelity precursor signal.
    module: discovery
    params:
      discovery_type: files
      targets:
        - finance-analyst-laptop
      network_touch: false

  - id: harvest-browser-creds
    name: Harvest browser credentials from enumerated host
    objective: >-
      Pull stored browser credentials from the same host enumeration
      identified; this is the bridge from a single user foothold to
      lateral-movement options.
    module: credential_access
    params:
      technique: browser_credentials
      # Target is propagated from the upstream `enumerate-files`
      # discovery step rather than re-declared here. This
      # demonstrates the runtime's `previous_step_results` plumbing:
      # the credential-access module reads
      # `context["previous_step_results"]["enumerate-files"]
      # ["artifacts"]["targets"]` and uses the first entry as the
      # effective target. Explicit `target:` would still win if
      # provided.
      target_from_step: enumerate-files
      network_touch: false

  - id: lateral-to-fileshare
    name: Pivot from compromised host to corporate fileshare via PsExec
    objective: >-
      Reuse the harvested credentials to pivot from the user host to
      the corporate fileshare via PsExec — a classic admin-share
      lateral-movement chain that defenders correlate with
      service-create + SMB telemetry.
    module: lateral_movement
    params:
      technique: psexec
      # Pivot host (`source`) is propagated from the upstream
      # `harvest-browser-creds` credential-access step rather than
      # re-declared. The destination (`target`) stays explicit since
      # no upstream step has enumerated `corp-fileshare`. Demonstrates
      # the lateral_movement module's `source_from_step` consumer
      # complement to the existing `target_from_step` slot.
      source_from_step: harvest-browser-creds
      target: corp-fileshare
      network_touch: false

  - id: stage-collected-data
    name: Stage sensitive files on fileshare for exfiltration
    objective: >-
      Concentrate the collected files on the fileshare so the
      subsequent exfil and impact steps each act on the same
      high-value blob — the staging directory IS the next two
      defender signals.
    module: collection
    params:
      technique: file_staging
      target: corp-fileshare
      network_touch: false

  - id: c2-channel
    name: Beacon HTTPS to staged attacker domain (C2)
    objective: >-
      Beacon to the freshly-registered attacker domain over HTTPS so
      defenders see the domain-registration -> C2 destination link
      they would not catch from C2 telemetry alone.
    module: command_control
    params:
      channel: https
      # C2 endpoint is propagated from the upstream
      # `stage-infrastructure` resource_development step. The
      # upstream step registered `invoice-portal.example.lab` as
      # `artifacts.target`; the command_control module reads it
      # via `c2_endpoint_from_step` and shapes it into
      # `https://<host>/c2`. The narrative: the freshly-registered
      # attacker-owned domain from step 1 IS the C2 endpoint the
      # loader beacons to a few steps later. This is the highest-
      # value detection-correlation hint in the chain — defenders
      # who watched domain registration in step 1 can pivot
      # straight to this destination.
      c2_endpoint_from_step: stage-infrastructure
      network_touch: false

  - id: exfil-over-c2
    name: Exfiltrate staged data over established C2 channel
    objective: >-
      Push the staged blob out over the same C2 channel established
      by the previous step; collection-host -> egress correlation is
      the headline defender signal here.
    module: exfiltration
    params:
      method: via_c2
      # Source host is propagated from the upstream
      # `stage-collected-data` collection step rather than re-
      # declared here. The narrative: exfil pulls the same host
      # the collection step staged data on. Defenders correlate
      # this against the c2-channel step for a "stage -> egress"
      # high-fidelity precursor.
      target_from_step: stage-collected-data
      network_touch: false

  - id: ransomware-impact
    name: Ransomware encrypts staged-data fileshare
    objective: >-
      Encrypt the same staged blob the previous steps egressed,
      forcing a recovery + extortion path for the victim org. Bulk
      ``.locked`` rewrites on the fileshare host close the chain.
    module: impact
    params:
      technique: data_encryption
      # Target host is propagated from the upstream
      # `stage-collected-data` collection step rather than re-
      # declared. The narrative: ransomware encrypts the same host
      # the collection step staged data on, which is the same host
      # the lateral step pivoted to. Five `previous_step_results`
      # consumer pairs are demonstrated end-to-end across this
      # scenario:
      #   1. enumerate-files       -> harvest-browser-creds   (target)
      #   2. harvest-browser-creds -> lateral-to-fileshare    (source)
      #   3. stage-infrastructure  -> c2-channel              (c2_endpoint)
      #   4. stage-collected-data  -> exfil-over-c2           (target)
      #   5. stage-collected-data  -> ransomware-impact       (target, this step)
      # Explicit `target:` would still win if added.
      target_from_step: stage-collected-data
      network_touch: false

expected_detections:
  - Adversary domain provisioning correlated with later phishing sender domain
  - Spearphishing precursor (email + LNK / macro / encoded payload)
  - Encoded PowerShell loader on a finance-user host
  - Process-name masquerading (image-name vs. parent / command-line mismatch)
  - Bulk file enumeration immediately preceding credential harvesting
  - Browser stored-credential extraction (Login Data / Cookies access)
  - PsExec / SMB administrative-share lateral movement to fileshare
  - Local data staging immediately before HTTPS-channel egress
  - HTTPS C2 beaconing to a freshly-provisioned attacker domain
  - Bulk file rewrites and ransom-note creation on the fileshare

blue_team_guidance:
  - Correlate domain-registration intelligence (T1583.001) with later
    HTTPS C2 (T1071.001) destinations to spot infrastructure-warning
    paths early.
  - Alert on encoded-PowerShell process creations from email-app parent
    chains; this scenario's loader step is the canonical signal.
  - Tune masquerading detections by comparing process image path with
    parent process and command-line; the masquerade step models the
    common svchost.exe rename pattern.
  - File-enumeration spikes on user endpoints immediately before
    credential extraction are a high-fidelity precursor — this scenario
    sequences them deliberately to test that detection.
  - PsExec to ADMIN$ followed by file staging on the destination is a
    classic "lateral + collection" pattern; tune service-creation
    (event 7045) plus file-event correlation rules against this
    scenario's run telemetry.
  - High-volume file rewrites with `.locked` / `.enc` / `.crypt`
    extensions are the impact-step signal; ensure ransomware analytics
    fire on this step's synthetic events.
