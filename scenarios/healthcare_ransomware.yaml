name: Healthcare ransomware tabletop chain
objective: Simulate a healthcare ransomware precursor path in a lab-safe workflow.
attack_coverage:
  - T1566
  - T1059
  - T1053
  - T1041
  - T1486
fail_fast: false
steps:
  - id: step1
    name: Phishing attachment delivered to hospital analyst
    module: initial_access
    params:
      vector: phishing_attachment
      target: hospital-analyst
      network_touch: false
  - id: step2
    name: Hidden PowerShell script runs from attachment
    module: execution
    params:
      command: powershell -nop -w hidden Write-Output "simulated ransomware prep"
      network_touch: false
  - id: step3
    name: Scheduled-task persistence drops on victim host
    module: persistence
    params:
      technique: scheduled_task
      network_touch: false
  - id: step4
    name: Data staged and exfiltrated over C2 channel
    module: exfiltration
    params:
      method: via_c2
      network_touch: false
  - id: step5
    name: Ransomware encrypts hospital fileshare
    module: impact
    params:
      technique: data_encryption
      target: hospital-fileshare
      network_touch: false
expected_detections:
  - process_creation
  - scheduled_task_creation
  - suspicious_data_staging
blue_team_guidance:
  - Tune process creation detections for encoded PowerShell and hidden windows.
  - Baseline scheduled task creation and alert on anomalous task names.
  - Correlate suspicious execution plus staging behavior in a short timeframe.
