name: tests

on:
  pull_request:
  push:
    branches:
      - main
      - cursor/**

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install -e .

      - name: Compile gate
        run: python -m compileall -q src tests

      - name: Run tests
        run: pytest -q
