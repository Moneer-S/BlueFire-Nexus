name: Security and Quality Analysis

on:
  push:
    branches: [main, "cursor/**"]
  pull_request:
    branches: [main]

jobs:
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Gitleaks/detect-secrets need full history to scan past commits.
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install -e .

      # Secret scanning runs FIRST so dual-use Bandit findings cannot mask
      # leaked credentials by failing the workflow before secrets are checked.
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run detect-secrets
        run: |
          detect-secrets scan --all-files --baseline .secrets.baseline
          detect-secrets audit --report .secrets.baseline || true

      - name: Run Bandit (advisory during stabilization)
        # `-ll` reports medium-and-higher only; tuned for a dual-use
        # adversary-emulation repo where expected offensive patterns must not
        # mask real findings. `--exit-zero` keeps Bandit advisory during the
        # stabilization window so dual-use offensive code (e.g. MD5 for
        # campaign IDs, os.system for legacy net-evasion research, mock C2
        # bind on 0.0.0.0) does not block the baseline merge. Findings still
        # print to the workflow log for review.
        #
        # TODO(post-Phase-9): replace --exit-zero with narrow per-line `nosec`
        # annotations (with explicit justification comments naming the
        # offensive context) on each documented dual-use finding, then drop
        # --exit-zero so any new Bandit finding fails CI again.
        run: bandit -r src -ll --exit-zero

      - name: Run pip-audit
        run: pip-audit

      - name: Generate SBOM
        run: cyclonedx-py requirements -i requirements.txt -o sbom.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.json
