name: Security and Quality Analysis

on:
  push:
    branches: [main, "cursor/**"]
  pull_request:
    branches: [main]

jobs:
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Gitleaks/detect-secrets need full history to scan past commits.
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install -e .

      # Secret scanning runs FIRST so dual-use Bandit findings cannot mask
      # leaked credentials by failing the workflow before secrets are checked.
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run detect-secrets
        run: |
          detect-secrets scan --all-files --baseline .secrets.baseline
          detect-secrets audit --report .secrets.baseline || true

      - name: Run Bandit
        # `-ll` reports medium-and-higher only; tuned for a dual-use
        # adversary-emulation repo. Each expected offensive-pattern finding
        # carries a narrow `# nosec BXXX - <reason>` annotation in source so
        # Bandit fails on any *new* unapproved finding. `pyproject.toml`
        # already excludes `tests` and `archive` and skips B101 (assert).
        run: bandit -r src -ll

      - name: Run pip-audit
        run: pip-audit

      - name: Generate SBOM
        run: cyclonedx-py requirements -i requirements.txt -o sbom.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.json
