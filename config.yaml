# BlueFire-Nexus runtime configuration (safe defaults)
general:
  name: "BlueFire-Nexus"
  version: "2.0.0"
  mode: "simulation"
  log_level: "INFO"
  dry_run: true
  safeties:
    auto_wipe: false
    max_runtime: 3600
    allowed_subnets:
      - "10.0.0.0/24"

modules:
  ai:
    enabled: false
    provider: "template"
    model: "default"
    api_base: ""
  command_control:
    enabled: false
  discovery:
    enabled: true
  execution:
    enabled: true
    allow_real_execution: false
    timeout_seconds: 10
  persistence:
    enabled: true
  defense_evasion:
    enabled: true
  anti_detection:
    enabled: true
  exfiltration:
    enabled: false
  intelligence:
    enabled: true
  network_obfuscator:
    enabled: true
  resource_development:
    enabled: true
  reconnaissance:
    enabled: true
  legacy:
    enable_all_lab_capabilities: false
    lab_mode: "simulate"
    lab_acknowledged: false
    actor_pack:
      enabled: true
      mode: "simulate"
      lab_acknowledged: false
      capabilities:
        apt29:
          enabled: true
          emulate_enabled: false
        apt28:
          enabled: true
          emulate_enabled: false
        apt32:
          enabled: true
          emulate_enabled: false
        apt38:
          enabled: true
          emulate_enabled: false
        apt41:
          enabled: true
          emulate_enabled: false
    c2_pack:
      enabled: true
      mode: "simulate"
      lab_acknowledged: false
      capabilities:
        dns_tunneling:
          enabled: true
          emulate_enabled: false
        tls_fast_flux:
          enabled: true
          emulate_enabled: false
        websocket_quic:
          enabled: true
          emulate_enabled: false
        solana_rpc:
          enabled: true
          emulate_enabled: false
        network_obfuscator_legacy:
          enabled: true
          emulate_enabled: false
    stealth_pack:
      enabled: true
      mode: "simulate"
      lab_acknowledged: false
      capabilities:
        anti_forensic:
          enabled: true
          emulate_enabled: false
        anti_sandbox:
          enabled: true
          emulate_enabled: false
        anti_detection_legacy:
          enabled: true
          emulate_enabled: false
        dynamic_api:
          enabled: true
          emulate_enabled: false

# Telemetry is local-first in the current baseline. Outbound SIEM exporters
# (Splunk/OpenSearch/Elasticsearch/NGSIEM) were removed during stabilization;
# legacy `sinks` entries naming those types are ignored at load time with a
# deprecation warning rather than restoring egress silently.
telemetry:
  enabled: true
  default_sink: "jsonl"
  local:
    enabled: true
    file: "telemetry.jsonl"
  sinks:
    - type: "jsonl"
      enabled: true

copilot:
  enabled: false
  rag:
    knowledge_paths:
      - "README.md"
      - "docs/ARCHITECTURE.md"
      - "docs"
