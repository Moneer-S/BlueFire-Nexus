# BlueFire-Nexus runtime configuration (safe defaults)
general:
  name: "BlueFire-Nexus"
  version: "2.0.0"
  mode: "simulation"
  log_level: "INFO"
  dry_run: true
  safeties:
    auto_wipe: false
    max_runtime: 3600
    allowed_subnets:
      - "10.0.0.0/24"

modules:
  ai:
    enabled: false
    provider: "template"
    model: "default"
    api_base: ""
  command_control:
    enabled: false
  discovery:
    enabled: true
  execution:
    enabled: true
    allow_real_execution: false
    timeout_seconds: 10
  persistence:
    enabled: true
  defense_evasion:
    enabled: true
  anti_detection:
    enabled: true
  exfiltration:
    enabled: false
  intelligence:
    enabled: true
  network_obfuscator:
    enabled: true
  resource_development:
    enabled: true
  reconnaissance:
    enabled: true

telemetry:
  enabled: true
  default_sink: "jsonl"
  sinks:
    - type: "jsonl"
      enabled: true
    - type: "opensearch"
      enabled: false
      endpoint: "{{ env OPENSEARCH_ENDPOINT }}"
      headers:
        Authorization: "Bearer {{ env OPENSEARCH_API_KEY }}"
      timeout_seconds: 10
      verify_ssl: true
    - type: "elasticsearch"
      enabled: false
      endpoint: "{{ env ELASTICSEARCH_ENDPOINT }}"
      headers:
        Authorization: "ApiKey {{ env ELASTICSEARCH_API_KEY }}"
      timeout_seconds: 10
      verify_ssl: true
    - type: "ngsiem"
      enabled: false
      endpoint: "{{ env NGSIEM_HEC_ENDPOINT }}"
      headers:
        Authorization: "Bearer {{ env NGSIEM_TOKEN }}"
      timeout_seconds: 10
      verify_ssl: true
    - type: "splunk"
      enabled: false
      endpoint: "{{ env SPLUNK_HEC_ENDPOINT }}"
      headers:
        Authorization: "Splunk {{ env SPLUNK_TOKEN }}"
      timeout_seconds: 10
      verify_ssl: true

copilot:
  enabled: false
  rag:
    knowledge_paths:
      - "README.md"
      - "docs/ARCHITECTURE.md"
      - "docs"
